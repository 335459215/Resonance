android.builtInKotlin=true
android.dependency.useConstraints=false
android.enableAppCompileTimeRClass=true
android.newDsl=true
android.r8.optimizedResourceShrinking=true
android.r8.strictFullModeForKeepRules=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=true
android.uniquePackageNames=true
android.useAndroidX=true
android.usesSdkInManifest.disallowed=true

org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -Dconsole.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx2g -Dfile.encoding=UTF-8 -Dconsole.encoding=UTF-8
kotlin.compiler.execution.strategy=in-process
