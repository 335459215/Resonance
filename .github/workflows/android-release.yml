name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Get version from tag
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="0.0.2"
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${VERSION}"
    
    - name: Create gradle.properties
      run: |
        echo "RELEASE_STORE_FILE=release.keystore" >> gradle.properties
        echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties
        cat gradle.properties
    
    - name: Decode Keystore
      uses: timheuer/base64-to-file@v1.2
      id: keystore
      with:
        fileName: 'release.keystore'
        encodedString: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
    
    - name: Move Keystore to root
      run: |
        mv ${{ steps.keystore.outputs.filePath }} release.keystore
        ls -la release.keystore
    
    - name: Build Release APK
      run: |
        echo "🔨 Starting build..."
        ./gradlew clean assembleRelease --no-daemon
        echo "✅ Build completed!"
    
    - name: Verify APK
      run: |
        echo "📦 Verifying APK..."
        ls -lh app/build/outputs/apk/release/
        echo "✅ APK verification complete!"
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/app-release.apk
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ steps.version.outputs.version }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
