name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Get current version
      id: version
      run: |
        # 获取最新的 release tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        # 提取版本号
        VERSION=${LATEST_TAG#v}
        IFS='.' read -r -a VERSION_ARRAY <<< "$VERSION"
        MAJOR=${VERSION_ARRAY[0]:-0}
        MINOR=${VERSION_ARRAY[1]:-0}
        PATCH=${VERSION_ARRAY[2]:-0}
        
        # 增加版本号 (patch + 1)
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
        
        echo "current_version=${VERSION}" >> $GITHUB_OUTPUT
        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "Current version: ${VERSION}"
        echo "New version: ${NEW_VERSION}"
    
    - name: Update version in build.gradle.kts
      run: |
        NEW_VERSION=${{ steps.version.outputs.new_version }}
        echo "Updating version to ${NEW_VERSION}"
        
        # 更新 app/build.gradle.kts 中的 versionName
        sed -i "s/versionName = \".*\"/versionName = \"${NEW_VERSION}\"/" app/build.gradle.kts
        
        # 更新 versionCode (使用时间戳)
        TIMESTAMP=$(date +%Y%m%d%H)
        sed -i "s/versionCode = [0-9]*/versionCode = ${TIMESTAMP}/" app/build.gradle.kts
        
        cat app/build.gradle.kts | grep -A 2 "version"
    
    - name: Build debug APK
      run: ./gradlew assembleDebug
    
    - name: Build release APK
      run: ./gradlew assembleRelease
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-${{ steps.version.outputs.new_version }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Upload release APK
      uses: actions/upload-artifact@v4
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        name: app-release-${{ steps.version.outputs.new_version }}
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: Release v${{ steps.version.outputs.new_version }}
        body: |
          ## 🎵 Resonance v${{ steps.version.outputs.new_version }}
          
          ### 📝 更新内容
          - 自动构建版本
          - 构建时间：$(date '+%Y-%m-%d %H:%M:%S')
          - Commit: ${{ github.sha }}
          
          ### 📥 下载
          - [下载 Debug 版本](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.new_version }}/app-debug.apk)
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Commit version update
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add app/build.gradle.kts
        git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
